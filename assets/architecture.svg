<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="620" fill="#fafafa"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#1a1a1a">LexGraph — System Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#888">Indian Supreme Court · GraphRAG Inference Benchmark</text>

  <!-- USER QUERY box -->
  <rect x="325" y="80" width="250" height="48" rx="8" fill="#fff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="450" y="99" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a1a">User query</text>
  <text x="450" y="116" text-anchor="middle" font-size="11" fill="#888">natural language legal question</text>

  <!-- Arrow from query to 3 pipelines -->
  <line x1="330" y1="128" x2="140" y2="188" stroke="#bbb" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="128" x2="450" y2="188" stroke="#bbb" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="570" y1="128" x2="760" y2="188" stroke="#bbb" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PIPELINE 1 -->
  <rect x="30" y="188" width="220" height="52" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="140" y="209" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Pipeline 1 — LLM only</text>
  <text x="140" y="228" text-anchor="middle" font-size="11" fill="#5F5E5A">raw prompt · no retrieval · baseline</text>

  <!-- PIPELINE 2 -->
  <rect x="340" y="188" width="220" height="52" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="450" y="209" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Pipeline 2 — Basic RAG</text>
  <text x="450" y="228" text-anchor="middle" font-size="11" fill="#185FA5">ChromaDB vector search + LLM</text>

  <!-- PIPELINE 3 -->
  <rect x="650" y="188" width="220" height="52" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="760" y="209" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Pipeline 3 — GraphRAG</text>
  <text x="760" y="228" text-anchor="middle" font-size="11" fill="#0F6E56">TigerGraph + multi-hop + LLM</text>

  <!-- P2 sub-components -->
  <line x1="450" y1="240" x2="450" y2="278" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrB)"/>
  <rect x="355" y="278" width="190" height="44" rx="6" fill="#fff" stroke="#85B7EB" stroke-width="1"/>
  <text x="450" y="296" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5">ChromaDB</text>
  <text x="450" y="312" text-anchor="middle" font-size="10" fill="#378ADD">sentence-transformers · top-5 chunks</text>

  <!-- P3 sub-components: entity extractor -->
  <line x1="760" y1="240" x2="760" y2="278" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrG)"/>
  <rect x="652" y="278" width="216" height="44" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="1"/>
  <text x="760" y="296" text-anchor="middle" font-size="12" font-weight="500" fill="#0F6E56">LLM entity extractor</text>
  <text x="760" y="312" text-anchor="middle" font-size="10" fill="#1D9E75">cases · articles · acts · judges · concepts</text>

  <!-- P3 sub-component: TigerGraph -->
  <line x1="760" y1="322" x2="760" y2="358" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrG)"/>
  <rect x="638" y="358" width="244" height="60" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="1.5"/>
  <text x="760" y="378" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">TigerGraph Savanna</text>
  <text x="760" y="395" text-anchor="middle" font-size="10" fill="#0F6E56">multi-hop traversal · 3 hops</text>
  <text x="760" y="410" text-anchor="middle" font-size="10" fill="#0F6E56">Case → Article → Judge → Precedent</text>

  <!-- Dataset box -->
  <rect x="330" y="358" width="220" height="60" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="440" y="378" text-anchor="middle" font-size="12" font-weight="500" fill="#633806">OpenNyai ILDC dataset</text>
  <text x="440" y="395" text-anchor="middle" font-size="10" fill="#854F0B">70k SC judgments · 2M+ tokens</text>
  <text x="440" y="410" text-anchor="middle" font-size="10" fill="#854F0B">public domain · HuggingFace</text>

  <!-- Arrow: dataset -> ChromaDB -->
  <line x1="440" y1="358" x2="450" y2="322" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrA)"/>
  <!-- Arrow: dataset -> TigerGraph -->
  <line x1="550" y1="388" x2="638" y2="388" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrA)"/>

  <!-- LLM layer -->
  <rect x="30" y="460" width="220" height="44" rx="6" fill="#fff" stroke="#B4B2A9" stroke-width="1"/>
  <text x="140" y="479" text-anchor="middle" font-size="12" font-weight="500" fill="#444441">LLM (gpt-4o-mini)</text>
  <text x="140" y="495" text-anchor="middle" font-size="10" fill="#888">raw prompt → answer</text>

  <rect x="340" y="460" width="220" height="44" rx="6" fill="#fff" stroke="#85B7EB" stroke-width="1"/>
  <text x="450" y="479" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5">LLM (gpt-4o-mini)</text>
  <text x="450" y="495" text-anchor="middle" font-size="10" fill="#888">chunk context + query → answer</text>

  <rect x="650" y="460" width="220" height="44" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="1"/>
  <text x="760" y="479" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">LLM (gpt-4o-mini)</text>
  <text x="760" y="495" text-anchor="middle" font-size="10" fill="#888">graph context + query → answer</text>

  <!-- Arrows P1 → LLM1 -->
  <line x1="140" y1="240" x2="140" y2="460" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- P2 → LLM2 -->
  <line x1="450" y1="322" x2="450" y2="460" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrB)"/>
  <!-- P3 → LLM3 -->
  <line x1="760" y1="418" x2="760" y2="460" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Evaluation layer -->
  <rect x="160" y="548" width="580" height="52" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="450" y="569" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Evaluation + Comparison Dashboard</text>
  <text x="450" y="586" text-anchor="middle" font-size="11" fill="#534AB7">tokens · latency · cost · BERTScore F1 · LLM-as-a-Judge · bonus threshold badges</text>

  <!-- Arrows → eval -->
  <line x1="140" y1="504" x2="300" y2="548" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="450" y1="504" x2="450" y2="548" stroke="#85B7EB" stroke-width="1" marker-end="url(#arrB)"/>
  <line x1="760" y1="504" x2="600" y2="548" stroke="#5DCAA5" stroke-width="1" marker-end="url(#arrG)"/>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <!-- Legend -->
  <rect x="30" y="548" width="118" height="52" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="40" y="558" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="56" y="568" font-size="10" fill="#5F5E5A">LLM only</text>
  <rect x="40" y="574" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#85B7EB"/>
  <text x="56" y="584" font-size="10" fill="#185FA5">Basic RAG</text>
  <rect x="86" y="558" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#5DCAA5"/>
  <text x="102" y="568" font-size="10" fill="#0F6E56">GraphRAG</text>
  <rect x="86" y="574" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#EF9F27"/>
  <text x="102" y="584" font-size="10" fill="#854F0B">Dataset</text>
</svg>
